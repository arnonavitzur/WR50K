,"side":"both","cue":"Walk until HR is below 110 bpm before stretching."},{"name":"Standing quad stretch","category":"mobility","duration_sec":30,"sets":2,"side":"alternating","cue":"Tuck pelvis under to feel the stretch in the front of the hip too."},{"name":"Standing calf stretch (bent + straight knee)","category":"calf","duration_sec":30,"sets":2,"side":"alternating","cue":"Two angles per side: knee straight (gastroc) and knee bent (soleus)."},{"name":"Half-kneeling hip flexor stretch","category":"mobility","duration_sec":30,"sets":2,"side":"alternating","cue":"Squeeze the back glute first, THEN lean forward."},{"name":"Pigeon stretch","category":"mobility","duration_sec":45,"side":"alternating","cue":"Square hips. If knee complains, lie back instead (figure-4 supine)."},{"name":"Foam roll quads, IT band, calves (optional)","category":"mobility","duration_sec":180,"side":"both","cue":"60 seconds per area; pause and breathe on tender spots."}],"notes":"Do within 15 minutes of finishing the run. Especially important after long runs and power-climb days \u2014 eccentric load + walking cooldown protects the quads."}},"strength":{"pre_strength":{"duration_min":8,"exercises":[{"name":"Foam roll \u2014 quads, IT band, calves","category":"mobility","duration_sec":120,"side":"both","cue":"Slow passes, 30 sec per area. Pause on tender spots."},{"name":"Bodyweight squat to box (parallel)","category":"activation","sets":2,"reps":10,"side":"both","cue":"Sit back to the box, light touch, drive up. Focus on tracking knees over toes. This gates the knee \u2014 if this hurts, reduce depth or skip loaded step work today."},{"name":"Banded lateral walk","category":"activation","sets":2,"reps":10,"side":"alternating","cue":"Band above knees. Stay low in quarter-squat. Push through the heels."},{"name":"Single-leg balance \u2014 eyes closed","category":"balance","sets":1,"duration_sec":30,"side":"alternating","cue":"Close eyes, find balance. If you wobble excessively, open eyes. This wakes up foot intrinsics."}],"notes":"KNEE GATE: the bodyweight box squat is diagnostic. If anterior knee pain is present after this, replace any loaded step-up/step-down in today's session with an isometric wall sit (3 x 30 sec). Do not push through sharp pain."},"post_strength":{"duration_min":10,"exercises":[{"name":"Standing quad stretch","category":"mobility","sets":1,"duration_sec":45,"side":"alternating","cue":"Grab ankle behind you, keep knees together, tall posture. Gentle \u2014 no yanking."},{"name":"Standing calf stretch \u2014 straight knee (gastrocnemius)","category":"mobility","sets":1,"duration_sec":45,"side":"alternating","cue":"Wall lean, back leg straight, heel pressed down."},{"name":"Standing calf stretch \u2014 bent knee (soleus)","category":"mobility","sets":1,"duration_sec":45,"side":"alternating","cue":"Same position but bend the back knee. Stretch shifts lower toward the Achilles."},{"name":"Pigeon stretch (hip external rotation)","category":"mobility","sets":1,"duration_sec":60,"side":"alternating","cue":"Front shin roughly parallel to your body. Walk hands forward, breathe into the stretch."},{"name":"T-spine rotation (open book)","category":"mobility","sets":1,"reps":8,"side":"alternating","cue":"Side-lying, knees stacked. Top arm opens like a book \u2014 follow hand with eyes. Exhale as you open."},{"name":"Ankle dorsiflexion mobilisation (knee-to-wall)","category":"mobility","sets":2,"reps":10,"side":"alternating","cue":"Foot a fist-width from wall. Drive knee over toes toward wall without lifting the heel. Measure progress: how far back can the foot go while knee still touches wall?"}],"notes":"Mobility priorities specific to White River: ankle dorsiflexion (descent efficiency), hip flexor length (climb stride + knee load), T-spine rotation (pole use), calf/soleus (descent + climb). Hold each stretch calmly \u2014 this is not a rush job."}}},"daily_routines":[{"id":"foot_correctives","title":"Foot & Arch Correctives","timing":"morning","duration_min":10,"active_weeks":"1-13","phase_overrides":[{"weeks":"11-13","modification":"Reduce all sets by 50% (round up). Keep all exercises \u2014 just halve the volume.","reason":"Taper: maintain neuromuscular patterns, reduce tissue stress"}],"exercises":[{"name":"Short-foot (doming)","category":"corrective","sets":3,"duration_sec":30,"side":"both","cue":"Shorten the arch by pulling ball of foot toward heel \u2014 do NOT curl the toes. Think about lifting the arch from underneath.","notes":"Emphasise right foot \u2014 hold 5 sec longer per rep on the right side."},{"name":"Toe yoga \u2014 big toe up / little toes down, then swap","category":"corrective","sets":2,"reps":10,"side":"both","cue":"Isolate the big toe from the others. If you can't separate them yet, use your hand to assist.","progression_note":"By week 4, aim for unassisted isolation on both feet."},{"name":"Heel walks","category":"corrective","sets":2,"duration_sec":30,"side":"both","cue":"Toes fully lifted off the ground. Walk slowly \u2014 feel the tibialis anterior working."},{"name":"Tibialis posterior raise (band-resisted inversion)","category":"corrective","sets":2,"reps":15,"side":"both","cue":"Loop band around forefoot, anchor to a fixed point on the outside. Invert the foot against band resistance. Slow and controlled.","notes":"Primary arch support muscle. Right side gets an extra set (3 total on right)."},{"name":"Big toe extension mobilisation","category":"mobility","sets":2,"duration_sec":20,"side":"both","cue":"Kneel with toes tucked under, sit back gently onto heels. Hold at first sign of stretch \u2014 don't force."}],"notes":"NON-NEGOTIABLE. This block prevents the right-foot hot spot that could end the race at mile 10. Do it every morning before anything else. If you skip a day, do double the next morning. The correctives have been lapsed \u2014 expect the first 2 weeks to feel tedious. Push through; by week 3 it becomes automatic."},{"id":"hip_activation","title":"Hip Activation & Glute Wake-Up","timing":"morning","duration_min":8,"active_weeks":"1-13","phase_overrides":[{"weeks":"11-13","modification":"Reduce all sets by 50% (round up). Keep all exercises.","reason":"Taper: maintain activation patterns, reduce volume"}],"exercises":[{"name":"Side-lying clamshell","category":"hip_stability","sets":2,"reps":15,"side":"both","cue":"Heels together, knees apart. Drive from the glute \u2014 don't rotate the pelvis. Slow on the way down.","progression_note":"Add a light band around knees from week 3."},{"name":"Hip CARs (controlled articular rotations)","category":"mobility","sets":2,"reps":5,"side":"alternating","cue":"On all fours. Draw the biggest circle you can with the knee without moving the spine. Slow \u2014 5 seconds per circle.","notes":"Both directions (clockwise and counter-clockwise) count as one rep."},{"name":"Glute bridge \u2014 feet elevated on box","category":"activation","sets":2,"reps":12,"side":"both","cue":"Squeeze glutes hard at the top. 2-second hold. Ribs down \u2014 don't hyperextend the back."},{"name":"Standing hip flexor stretch (half-kneeling)","category":"mobility","sets":2,"duration_sec":30,"side":"alternating","cue":"Posterior pelvic tilt first (tuck tailbone), then lean forward into the stretch. You should feel it in the front of the back hip."}],"notes":"Controls pronation from above (glute med) and addresses the hip flexor tightness that contributes to anterior knee load. Do immediately after foot correctives \u2014 the two blocks together take ~18 min."},{"id":"shoulder_maintenance","title":"Shoulder & Scapular Maintenance","timing":"morning","duration_min":5,"active_weeks":"1-13","phase_overrides":[{"weeks":"11-13","modification":"Reduce sets by 50%. Keep all exercises.","reason":"Taper"}],"exercises":[{"name":"Band pull-apart","category":"upper_body","sets":2,"reps":15,"side":"both","cue":"Arms straight out front, pull band to chest level by squeezing shoulder blades together. Slow return.","notes":"Use light band. This is scapular control, not a strength exercise."},{"name":"Band external rotation (90/90)","category":"corrective","sets":2,"reps":12,"side":"alternating","cue":"Elbow at 90\u00b0, upper arm at shoulder height. Rotate forearm up against band resistance. Emphasise left side \u2014 3 sets on the left.","notes":"Left shoulder requires extra attention. If the left side feels 'sticky' or weak, add a third set on that side."},{"name":"Scapular wall slides","category":"mobility","sets":2,"reps":10,"side":"both","cue":"Back flat against wall. Slide arms up to full extension, keeping contact with the wall. If you lose contact, that's your current range \u2014 work within it."}],"notes":"Prevents left shoulder flare-ups and builds the scapular endurance needed for 6+ hours of pole use on race day. Quick block \u2014 tack it onto the end of the hip activation."}],"supplements":[{"name":"Vitamin D3","dose":"2000 IU","timing":"Morning with breakfast","timing_slot":"morning","rationale":"Bone health, immune function, recovery support. Essential for a 50-year-old in heavy training. Already taking \u2014 continue.","active_weeks":"1-13","notes":"If blood work is done and shows deficiency (<30 ng/mL), increase to 4000 IU. Take with fat-containing food for absorption."},{"name":"Omega-3 fish oil (EPA/DHA)","dose":"2g combined EPA+DHA","timing":"Morning with breakfast","timing_slot":"morning","rationale":"Anti-inflammatory, joint health, cardiovascular support. Especially valuable during high-volume training with eccentric loading.","active_weeks":"1-13","notes":"Choose a high-quality brand with at least 1000mg EPA + 500mg DHA per serving. Take with food. Not currently taking \u2014 begin immediately."},{"name":"Magnesium glycinate","dose":"400mg elemental magnesium","timing":"Evening, 30-60 min before bed","timing_slot":"evening","rationale":"Muscle relaxation, sleep quality, cramping prevention. Glycinate form is best absorbed and least likely to cause GI issues. Already taking \u2014 continue.","active_weeks":"1-13","notes":"Glycinate or bisglycinate form preferred. Avoid magnesium oxide (poor absorption). If any GI looseness, split dose: 200mg morning + 200mg evening."},{"name":"Creatine monohydrate","dose":"5g","timing":"With post-strength meal or shake","timing_slot":"post_run","rationale":"Supports strength gains, eccentric muscle recovery, and may aid cognitive function during long efforts. Already taking \u2014 continue.","active_weeks":"1-13","notes":"Take daily, even on rest days (with any meal). No loading phase needed \u2014 5g/day reaches saturation in ~3 weeks. Ensure adequate hydration (creatine increases intracellular water). Discontinue 3-5 days before race to drop ~1-2 lb water weight if desired, or continue through \u2014 personal preference."},{"name":"Collagen peptides","dose":"15g","timing":"30-60 min before strength sessions with 50mg vitamin C","timing_slot":"pre_run","rationale":"Tendon and connective tissue support. Taken before tendon-heavy sessions (as already practiced). Combine with vitamin C for collagen synthesis.","active_weeks":"1-13","notes":"Already taking. On non-strength days, take with breakfast. Pair with a vitamin C source (orange juice, berries, or supplement). Especially important given eccentric quad loading and anterior knee history."},{"name":"Vitamin C","dose":"250mg","timing":"With collagen dose (pre-strength or morning)","timing_slot":"pre_run","rationale":"Collagen synthesis cofactor. Immune support during high-volume training.","active_weeks":"1-13","notes":"Can get from food (orange juice with collagen dose) or supplement. Don't exceed 500mg/day \u2014 excessive doses may blunt training adaptations."},{"name":"Whey protein isolate","dose":"25-30g per serving","timing":"Post-run and/or post-strength as needed to hit daily protein target","timing_slot":"post_run","rationale":"Convenient, fast-absorbing protein to support 150-160g daily target. Already taking \u2014 continue.","active_weeks":"1-13","notes":"Use as a supplement to whole-food protein, not a replacement. Typical use: post-run shake, or evening shake if daily protein target isn't met by dinner."},{"name":"Caffeine (via GU Roctane caffeine gels)","dose":"35mg per gel, max 2-3 gels per long effort","timing":"During long runs (hour 3+ only) and race day (hour 4+)","timing_slot":"pre_run","rationale":"Performance enhancement during long efforts. Strategic use only \u2014 not every run. Reserved for the hard back half.","active_weeks":"4-13","notes":"Daily coffee intake (3-4 cups, ~300-400mg caffeine) means tolerance is moderate. Race-day caffeine is conservative (70-105mg total from gels) and timed for the difficult final hours. Consider reducing daily coffee by 1 cup in race week (not eliminating \u2014 withdrawal headaches are worse than slight tolerance)."},{"name":"Electrolyte tabs (SaltStick or similar)","dose":"1 capsule per 45-60 min during long runs; 1/hr during shorter quality sessions if hot","timing":"During training runs over 60 min","timing_slot":"pre_run","rationale":"Sodium replacement during exercise. SaltStick provides 225mg Na per capsule. Already using \u2014 continue.","active_weeks":"1-13","notes":"Race day: increase to every 45 min (targeting 600-700mg Na/hr). Warm-day variant: every 30-40 min (800-1000mg Na/hr). Always take with water, never dry."}],"days":{"2026-04-27":{"date":"2026-04-27","day_of_week":"Monday","week_number":1,"flex":false,"rest_day":false,"run":{"phase":"Base","weekly_targets":{"mileage_mi":30,"vertical_ft":4400,"long_run_mi":15,"notes":"Base week. New default in effect: Mon tempo / Tue-Wed easy / Thu power-climb / Fri shakeout / Sat long / Sun rest."},"week_notes":"Welcome to the build. Goals this week: re-establish current volume, dial in the new weekly rhythm, and bank one calibration tempo for comparison after the LTHR TT next Tuesday. No poles on Thursday yet \u2014 we want a no-pole baseline of climb form before adding the new tool.","day_notes":"Welcome. DOUBLE DAY (run + lower strength) \u2014 RUN FIRST while fresh. Strength after, ideally with at least 4-6 hours between. Read through the entire plan before tomorrow.","sessions":[{"type":"run","subtype":"tempo","title":"Tempo \u2014 plan kickoff (continuity)","duration_min":55,"distance_mi":5.5,"elevation_gain_ft":200,"terrain":"road","hr_cap_bpm":153,"hr_zone":"Z3","pace_target":{"min_per_mi_slow":"9:15","min_per_mi_fast":"8:30"},"poles":false,"key_cue":"Comfortably hard. Conversation in 3-4 word fragments only.","fueling_required":false,"notes":"Intensity: Quality. Structure: 12-15 min Z1 warmup, 22 min @ Z3 (144-153 bpm) sustained, 10 min Z1 cooldown. Road or smooth surface preferred for clean pacing. Plan day 1. Continuity tempo from your existing rhythm. Note avg pace and HR \u2014 useful baseline before next Tuesday's LTHR TT."}]},"strength":{"phase":"Foundation","weekly_targets":{"strength_sessions":3,"notes":"3 sessions (2 lower + 1 upper). Movement quality first. Establish daily routines \u2014 these are the most important habit to build this week."},"week_notes":"Week 1 \u2014 Foundation. You're starting strength work while simultaneously increasing run volume. The body needs time to absorb both stimuli. This week is about learning the movement patterns, establishing the daily corrective habit, and confirming the knee tolerates the eccentric work. All loads are bodyweight or light. If the knee flares on any exercise, note it and we'll adjust.","day_notes":"DOUBLE DAY \u2014 AM tempo run + PM lower strength. Run first. 4-6 hr separation minimum.","sessions":[{"type":"strength","subtype":"lower","title":"Lower A \u2014 Eccentric Quad Foundation","duration_min":50,"exercises":[{"name":"Goblet squat","category":"eccentric_quad","sets":3,"reps":10,"tempo":"3-1-2","load":"light","side":"both","cue":"Elbows inside knees at bottom. 3 sec down, 1 sec pause, 2 sec up. Light dumbbell \u2014 15-25 lb.","progression_note":"Increase load by 5 lb per week if form is solid."},{"name":"Step-down from box (12 inch)","category":"eccentric_quad","sets":3,"reps":8,"tempo":"4-1-1","load":"bodyweight","side":"alternating","cue":"Stand on box, lower trailing foot to floor over 4 full seconds. Control the descent \u2014 this is the money exercise for your race. Tap the floor lightly, drive back up.","progression_note":"Hold 5 lb dumbbells from week 3. Progress to 18-inch box from week 5."},{"name":"Romanian deadlift (dumbbell)","category":"hip_stability","sets":3,"reps":10,"tempo":"3-1-2","load":"light","side":"both","cue":"Soft knees, hinge from hips, dumbbells trace down the thighs. Feel the hamstrings stretch on the way down. Squeeze glutes to stand up.","progression_note":"Move to barbell RDL from week 3 if form allows."},{"name":"Single-leg calf raise (straight knee)","category":"calf","sets":3,"reps":12,"tempo":"2-1-3","load":"bodyweight","side":"alternating","cue":"Rise to full height on 2 sec, pause 1 sec at top, lower over 3 sec. The slow lowering builds the eccentric capacity you'll need on the descent.","progression_note":"Hold a dumbbell from week 3."},{"name":"Pallof press (band)","category":"core","sets":3,"reps":10,"side":"alternating","cue":"Stand sideways to band anchor. Press hands straight out, resist the rotation. Pause 2 sec at full extension.","notes":"Anti-rotation core \u2014 directly supports trunk stability on uneven trail terrain."}],"notes":"Double-day with AM tempo run. Evening session \u2014 at least 4-6 hr after the run. Pre-strength warmup is mandatory (see protocols). Knee gate: if the box squat in warmup causes pain, replace step-downs with isometric wall sit 3x30 sec."}]},"nutrition":{"day_type_id":"tempo_lower_strength","day_type_label":"Tempo run + lower body strength (hard double-day)","phase_adjustment_applied":null,"daily_targets":{"calories_total":2900,"carbs_g":380,"protein_g":160,"fat_g":82,"fluid_ml_total":3200,"general_guidance":"Highest-demand weekday. Two hard sessions \u2014 quality run + heavy lower body. Front-load carbs at breakfast and lunch. Hit protein hard at both post-session windows. Hydrate aggressively.","notes":"This is the hardest weekday combination. Tempo depletes glycogen significantly, and lower body eccentric work on top demands maximum recovery nutrition. Sleep nutrition matters \u2014 casein or Greek yogurt before bed."},"session_fueling":[{"linked_session":{"type":"run","subtype":"tempo","position":"pre"},"timing":"90 min before run","calories":450,"carbs_g":70,"protein_g":15,"fat_g":8,"foods":["oatmeal with banana, honey, and berries","coffee"],"notes":"Larger pre-run meal for quality session. Low fiber, low fat \u2014 quick absorption."},{"linked_session":{"type":"run","subtype":"tempo","position":"post"},"timing":"Within 30 min of finishing","calories":350,"carbs_g":45,"protein_g":32,"foods":["whey protein shake with banana and oats"],"notes":"Aggressive recovery \u2014 strength session coming later."},{"linked_session":{"type":"strength","subtype":"lower","position":"pre"},"timing":"60 min before strength","calories":280,"carbs_g":42,"protein_g":14,"foods":["rice cakes with peanut butter and honey"],"notes":"Top up glycogen before heavy lower body work."},{"linked_session":{"type":"strength","subtype":"lower","position":"post"},"timing":"Within 30 min of finishing","calories":400,"carbs_g":48,"protein_g":40,"foods":["salmon or chicken with sweet potato and greens","or large protein shake + whole-food meal within 1hr"],"notes":"Maximum protein dose. This is the critical recovery window of the day."}],"notes":""}},"2026-04-28":{"date":"2026-04-28","day_of_week":"Tuesday","week_number":1,"flex":false,"rest_day":false,"run":{"phase":"Base","weekly_targets":{"mileage_mi":30,"vertical_ft":4400,"long_run_mi":15,"notes":"Base week. New default in effect: Mon tempo / Tue-Wed easy / Thu power-climb / Fri shakeout / Sat long / Sun rest."},"week_notes":"Welcome to the build. Goals this week: re-establish current volume, dial in the new weekly rhythm, and bank one calibration tempo for comparison after the LTHR TT next Tuesday. No poles on Thursday yet \u2014 we want a no-pole baseline of climb form before adding the new tool.","day_notes":"","sessions":[{"type":"run","subtype":"easy","title":"Easy Z2 trail","duration_min":55,"distance_mi":5.0,"elevation_gain_ft":400,"terrain":"trail","hr_cap_bpm":143,"hr_zone":"Z2","pace_target":{"min_per_mi_slow":"12:30","min_per_mi_fast":"11:00"},"poles":false,"key_cue":"If you can't hold a 5-word sentence, slow down.","fueling_required":false,"notes":"Intensity: Easy. HR governs, not pace. If 12:00/mi puts you above 143, slow to 12:30."}]},"strength":{"phase":"Foundation","weekly_targets":{"strength_sessions":3,"notes":"3 sessions (2 lower + 1 upper). Movement quality first. Establish daily routines \u2014 these are the most important habit to build this week."},"week_notes":"Week 1 \u2014 Foundation. You're starting strength work while simultaneously increasing run volume. The body needs time to absorb both stimuli. This week is about learning the movement patterns, establishing the daily corrective habit, and confirming the knee tolerates the eccentric work. All loads are bodyweight or light. If the knee flares on any exercise, note it and we'll adjust.","day_notes":"DOUBLE DAY \u2014 AM easy run + PM upper strength.","sessions":[{"type":"strength","subtype":"upper","title":"Upper A \u2014 Pole Foundation + Push/Pull","duration_min":50,"exercises":[{"name":"Dumbbell bench press","category":"upper_body","sets":3,"reps":10,"tempo":"2-1-2","load":"moderate","side":"both","cue":"Controlled descent, slight pause at chest, drive up. No bouncing.","progression_note":"Increase load by 5 lb every 2 weeks."},{"name":"Lat pulldown","category":"upper_body","sets":3,"reps":12,"tempo":"2-1-3","load":"moderate","side":"both","cue":"Pull to upper chest, squeeze lats at bottom, 3 sec return. This is the primary pole-push pattern.","progression_note":"Progress const strColor = (s) => STRENGTH_COLORS[s] || STRENGTH_COLORS.default;

const PHASE_STYLE = {
  Base:      { label: 'BASE',    hue: '#4ade80' },
  Build:     { label: 'BUILD',   hue: '#ff5a3c' },
  Peak:      { label: 'PEAK',    hue: '#ffb020' },
  Taper_1:   { label: 'TAPER',   hue: '#60a5fa' },
  Taper_2:   { label: 'TAPER',   hue: '#60a5fa' },
  Race_week: { label: 'RACE WK', hue: '#c084fc' },
};
const phaseStyle = (p) => PHASE_STYLE[p] || { label: (p||'PHASE').toUpperCase(), hue: A.textDim };

// ── Helpers ───────────────────────────────────────────────────
const formatDayLong = (iso) => new Date(iso+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
const dayShort = (iso) => new Date(iso+'T00:00:00').toLocaleDateString('en-US',{weekday:'short'}).slice(0,3).toUpperCase();
const dayNum = (iso) => new Date(iso+'T00:00:00').getDate();
const weekActive = (rangeStr, week) => {
  if (!rangeStr) return true;
  const parts = rangeStr.split('-').map(Number);
  return week >= parts[0] && week <= (parts[1]||parts[0]);
};
const resolveToday = (plan) => {
  const dates = Object.keys(plan.days).sort();
  const today = new Date().toISOString().slice(0,10);
  if (plan.days[today]) return today;
  let best = dates[0], bestDiff = Infinity;
  for (const d of dates) {
    const diff = Math.abs(new Date(d) - new Date(today));
    if (diff < bestDiff) { bestDiff = diff; best = d; }
  }
  return best;
};

// ── SVG Icons ─────────────────────────────────────────────────

  switch(name) {
    case 'run': return <svg {...s} viewBox="0 0 24 24"><circle cx="13" cy="4" r="2"/><path d="M4 22l3-7 4-2-2-4 4-2 4 5h3"/><path d="M9 13l2 5"/></svg>;
    case 'mountain': return <svg {...s} viewBox="0 0 24 24"><path d="M2 20l6-12 4 7 3-5 7 10z"/></svg>;
    case 'dumbbell': return <svg {...s} viewBox="0 0 24 24"><path d="M2 9v6M5 7v10M19 7v10M22 9v6M5 12h14"/></svg>;
    case 'pill': return <svg {...s} viewBox="0 0 24 24"><rect x="2" y="9" width="20" height="6" rx="3"/><path d="M12 9v6"/></svg>;
    case 'stretch': return <svg {...s} viewBox="0 0 24 24"><path d="M3 12c4-6 14-6 18 0M3 12c4 6 14 6 18 0"/></svg>;
    case 'clock': return <svg {...s} viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>;
    case 'down': return <svg {...s} viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>;
    case 'flame': return <svg {...s} viewBox="0 0 24 24"><path d="M12 22c4 0 7-3 7-7 0-4-4-6-3-10-3 1-7 4-7 9 0-2-1-3-2-4-1 2-2 3-2 5 0 4 3 7 7 7z"/></svg>;
    case 'drop': return <svg {...s} viewBox="0 0 24 24"><path d="M12 3l5 7a6 6 0 11-10 0z"/></svg>;
    case 'route': return <svg {...s} viewBox="0 0 24 24"><circle cx="6" cy="19" r="2"/><circle cx="18" cy="5" r="2"/><path d="M8 19h6a4 4 0 000-8h-4a4 4 0 010-8h6"/></svg>;
    case 'list': return <svg {...s} viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="4" rx="1"/><rect x="3" y="10" width="18" height="4" rx="1"/><rect x="3" y="16" width="18" height="4" rx="1"/></svg>;

    default: return null;
  }
}

// ── Day strip ─────────────────────────────────────────────────
function DayStrip({dates, selected, onSelect, plan}) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    const el = ref.current.querySelector(`[data-day="${selected}"]`);
    if (el) el.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
  }, [selected]);
  return (
    <div ref={ref} style={{display:'flex',gap:8,overflowX:'auto',padding:'4px 16px 12px',scrollbarWidth:'none'}}>
      {dates.map(d => {
        const day = plan.days[d];
        const isSel = d === selected;
        const run = day.run?.sessions?.[0];
        const str = day.strength?.sessions?.[0];
        const dots = [];
        if (run) dots.push(runColor(run.subtype).hue);
        if (str) dots.push(strColor(str.subtype).hue);
        if (!dots.length) dots.push(A.textFaint);
        return (
          <button key={d} data-day={d} onClick={()=>onSelect(d)} style={{
            flex:'0 0 auto', minWidth:54, height:72, padding:'8px 6px',
            borderRadius:14, border:`1.5px solid ${isSel ? A.text : A.border}`,
            background: isSel ? A.surface2 : 'transparent',
            color: A.text, cursor:'pointer', fontFamily:SANS,
            display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'space-between',
            transition:'all .18s ease', WebkitTapHighlightColor:'transparent',
          }}>
            <span style={{fontSize:9,letterSpacing:1.2,fontWeight:600,color:isSel?A.text:A.textFaint,fontFamily:MONO}}>
              {dayShort(d)}
            </span>
            <span style={{fontSize:20,fontWeight:700,fontFamily:DISPLAY,lineHeight:1,color:isSel?A.text:A.textDim}}>
              {dayNum(d)}
            </span>
            <span style={{display:'flex',gap:3,alignItems:'center',height:6}}>
              {dots.map((c,i) => <span key={i} style={{width:6,height:6,borderRadius:3,background:c}}/>)}
            </span>
          </button>
        );
      })}
    </div>
  );
}

// ── Supplements ───────────────────────────────────────────────
function Supplements({supplements, weekNumber}) {
  const slots = {morning:[],pre_run:[],post_run:[],evening:[]};
  const labels = {morning:'MORNING',pre_run:'PRE-WORKOUT',post_run:'POST-WORKOUT',evening:'EVENING'};
  const icons = {morning:'🌅',pre_run:'↑',post_run:'↓',evening:'🌙'};
  for (const s of supplements) {
    if (s.active_weeks && !weekActive(s.active_weeks, weekNumber)) continue;
    const slot = s.timing_slot || 'morning';
    if (slots[slot]) slots[slot].push(s);
  }
  const [open, setOpen] = useState(false);
  const totalCount = Object.values(slots).flat().length;
  return (
    <div style={{background:A.surface2,borderRadius:14,overflow:'hidden',border:`1px solid ${A.border}`,marginBottom:8}}>
      <button onClick={()=>setOpen(o=>!o)} style={{
        width:'100%',padding:'12px 14px',background:'transparent',border:'none',
        display:'flex',alignItems:'center',gap:10,cursor:'pointer',
        WebkitTapHighlightColor:'transparent',
      }}>
        <div style={{width:28,height:28,borderRadius:7,background:'rgba(34,211,238,0.1)',border:'1px solid rgba(34,211,238,0.25)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <Icon name="pill" size={13} color="#22d3ee"/>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:9,color:'#22d3ee',fontFamily:MONO,letterSpacing:1.2,fontWeight:700}}>SUPPLEMENTS</div>
          <div style={{fontSize:12,color:A.textDim}}>{totalCount} supplement{totalCount!==1?'s':''} · 4 timing windows</div>
        </div>
        <span style={{transform:open?'rotate(180deg)':'rotate(0)',transition:'transform .2s'}}>
          <Icon name="down" size={14} color={A.textFaint}/>
        </span>
      </button>
      {open && (
        <div style={{borderTop:`1px solid ${A.border}`,padding:'4px 14px 14px'}}>
      {Object.entries(slots).map(([slot, items]) => {
        if (!items.length) return null;
        return (
          <div key={slot} style={{marginBottom:14}}>
            <div style={{fontSize:9,color:A.textFaint,fontFamily:MONO,letterSpacing:1.4,fontWeight:700,marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
              <span style={{width:18,height:18,borderRadius:4,background:'rgba(34,211,238,0.08)',border:'1px solid rgba(34,211,238,0.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10}}>{icons[slot]}</span>
              {labels[slot]}
            </div>
            {items.map((s,i) => <SupplementRow key={i} sup={s}/>)}
          </div>
        );
      })}
        </div>
      )}
    </div>
  );
}

// ── Day Timeline ──────────────────────────────────────────────
function DayTimeline({day, plan}) {
  const items = [];
  const activeRoutines = plan.daily_routines.filter(r => weekActive(r.active_weeks, day.week_number));
  if (activeRoutines.length) {
    const totalMin = activeRoutines.reduce((s,r) => s + (r.duration_min||0), 0);
    items.push({time:'06:30',kind:'routine',label:'Daily routines',dur:totalMin,color:'#4ade80'});
  }
  const mornSups = plan.supplements.filter(s => s.timing_slot==='morning' && weekActive(s.active_weeks, day.week_number));
  if (mornSups.length) items.push({time:'07:00',kind:'supp',label:`Morning supplements (${mornSups.length})`,color:'#22d3ee'});
  const fueling = day.nutrition?.session_fueling || [];
  for (const s of (day.run?.sessions||[])) {
    const pre = fueling.find(f => f.linked_session?.position==='pre' && f.linked_session?.type==='run');
    const post = fueling.find(f => f.linked_session?.position==='post' && f.linked_session?.type==='run');
    if (pre) items.push({time:'06:30',kind:'fuel',label:'Pre-run fuel',sub:(pre.foods||[])[0],color:'#ffb020'});
    items.push({time:'08:00',kind:'session',label:s.title,dur:s.duration_min,color:runColor(s.subtype).hue,sub:runColor(s.subtype).name});
    if (post) items.push({time:'09:30',kind:'fuel',label:'Post-run recovery',sub:(post.foods||[])[0],color:'#ffb020'});
  }
  for (const s of (day.strength?.sessions||[])) {
    const pre = fueling.find(f => f.linked_session?.position==='pre' && f.linked_session?.type==='strength');
    const post = fueling.find(f => f.linked_session?.position==='post' && f.linked_session?.type==='strength');
    if (pre) items.push({time:'16:00',kind:'fuel',label:'Pre-strength fuel',sub:(pre.foods||[])[0],color:'#ffb020'});
    items.push({time:'17:00',kind:'session',label:s.title,dur:s.duration_min,color:strColor(s.subtype).hue,sub:strColor(s.subtype).name});
    if (post) items.push({time:'18:30',kind:'fuel',label:'Post-strength meal',sub:(post.foods||[])[0],color:'#ffb020'});
  }
  const eveSups = plan.supplements.filter(s => s.timing_slot==='evening' && weekActive(s.active_weeks, day.week_number));
  if (eveSups.length) items.push({time:'21:30',kind:'supp',label:`Evening: ${eveSups.map(s=>s.name).join(', ')}`,color:'#22d3ee'});
  items.sort((a,b) => a.time.localeCompare(b.time));
  return (
    <div style={{background:A.surface,borderRadius:20,padding:'16px 18px 18px',border:`1px solid ${A.border}`}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
        <span style={{padding:'3px 8px',borderRadius:4,fontSize:10,fontWeight:700,letterSpacing:1.4,color:A.text,background:'rgba(255,255,255,0.06)',fontFamily:MONO}}>DAY TIMELINE</span>
        <div style={{flex:1}}/>
        <Icon name="clock" size={14} color={A.textFaint}/>
      </div>
      <div style={{position:'relative'}}>
        <div style={{position:'absolute',left:38,top:6,bottom:6,width:1,background:A.border}}/>
        {items.map((it,i) => (
          <div key={i} style={{display:'flex',gap:12,alignItems:'flex-start',padding:'6px 0'}}>
            <div style={{width:32,fontSize:10,color:A.textFaint,fontFamily:MONO,letterSpacing:0.5,fontWeight:600,paddingTop:4,textAlign:'right'}}>{it.time}</div>
            <div style={{width:12,height:12,borderRadius:6,marginTop:4,flexShrink:0,background:A.bg,border:`2px solid ${it.color}`,boxShadow:`0 0 0 3px ${A.surface}`}}/>
            <div style={{flex:1,minWidth:0,paddingBottom:4}}>
              <div style={{fontSize:13,color:A.text,fontWeight:600,fontFamily:SANS,lineHeight:1.3}}>
                {it.label}
                {it.dur && <span style={{color:A.textFaint,fontWeight:400,fontFamily:MONO,fontSize:10,marginLeft:6}}>{it.dur}m</span>}
              </div>
              {it.sub && <div style={{fontSize:10,color:it.color,fontFamily:MONO,letterSpacing:0.6,fontWeight:600,marginTop:1}}>{it.sub}</div>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Plan View (Week list) ─────────────────────────────────────
function buildWeeks(plan) {
  const map = {};
  for (const [date, day] of Object.entries(plan.days)) {
    const w = day.week_number;
    if (!map[w]) map[w] = {n:w,phase:day.run?.phase||day.strength?.phase||'',start:date,end:date,targets:day.run?.weekly_targets||{},weekNotes:day.run?.week_notes||'',days:[]};
    const m = map[w];
    if (date < m.start) m.start = date;
    if (date > m.end) m.end = date;
    m.days.push(day);
  }
  return Object.values(map).sort((a,b) => a.n - b.n);
}

function formatRange(s, e) {
  const fmt = d => d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return `${fmt(new Date(s+'T00:00:00'))} — ${fmt(new Date(e+'T00:00:00'))}`;
}

function WeekCard({week, defaultOpen, onJump}) {
  const [open, setOpen] = useState(!!defaultOpen);
  const ph = phaseStyle(week.phase);
  const strengthCount = week.days.reduce((acc,d) => acc + ((d.strength?.sessions?.length)||0), 0);
  const t = week.targets;
  return (
    <div style={{background:A.surface,borderRadius:16,border:`1px solid ${A.border}`,overflow:'hidden'}}>
      <div style={{height:2,background:ph.hue}}/>
      <button onClick={()=>setOpen(o=>!o)} style={{
        width:'100%',padding:'14px 16px',background:'transparent',border:'none',
        textAlign:'left',cursor:'pointer',color:A.text,fontFamily:SANS,
        WebkitTapHighlightColor:'transparent',
      }}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,borderRadius:8,background:A.surface2,border:`1px solid ${A.border}`,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',flexShrink:0}}>
            <div style={{fontSize:8,color:A.textFaint,fontFamily:MONO,letterSpacing:0.6,fontWeight:600,lineHeight:1}}>WK</div>
            <div style={{fontSize:16,fontWeight:800,color:A.text,fontFamily:DISPLAY,letterSpacing:-0.5,lineHeight:1,marginTop:2}}>{week.n}</div>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
              <span style={{padding:'2px 7px',borderRadius:3,fontSize:9,fontWeight:700,letterSpacing:1.4,color:ph.hue,background:`${ph.hue}22`,fontFamily:MONO}}>{ph.label}</span>
              {strengthCount > 0 && <span style={{fontSize:9,color:A.textFaint,fontFamily:MONO,letterSpacing:1,fontWeight:600}}>+{strengthCount} STR</span>}
            </div>
            <div style={{fontSize:13,color:A.textDim,fontWeight:500}}>{formatRange(week.start, week.end)}</div>
          </div>
          <span style={{transform:open?'rotate(180deg)':'rotate(0)',transition:'transform .18s',color:A.textDim,fontSize:14,flexShrink:0}}>▾</span>
        </div>
        {t && (t.mileage_mi||t.vertical_ft||t.long_run_mi) && (
          <div style={{display:'flex',gap:14,marginTop:8}}>
            {t.mileage_mi != null && <div><div style={{fontSize:9,color:A.textFaint,fontFamily:MONO,letterSpacing:1,fontWeight:600}}>MI</div><div style={{fontSize:16,fontWeight:700,color:A.text,fontFamily:DISPLAY,letterSpacing:-0.4,marginTop:2}}>{t.mileage_mi}</div></div>}
            {t.vertical_ft != null && <div><div style={{fontSize:9,color:A.textFaint,fontFamily:MONO,letterSpacing:1,fontWeight:600}}>VERT</div><div style={{fontSize:16,fontWeight:700,color:A.text,fontFamily:DISPLAY,letterSpacing:-0.4,marginTop:2}}>{t.vertical_ft.toLocaleString()}ft</div></div>}
            {t.long_run_mi != null && <div><div style={{fontSize:9,color:A.textFaint,fontFamily:MONO,letterSpacing:1,fontWeight:600}}>LONG</div><div style={{fontSize:16,fontWeight:700,color:A.text,fontFamily:DISPLAY,letterSpacing:-0.4,marginTop:2}}>{t.long_run_mi}mi</div></div>}
          </div>
        )}
      </button>
      {open && (
        <div style={{padding:'0 16px 14px'}}>
          {week.weekNotes && <div style={{fontSize:12,color:A.textDim,lineHeight:1.5,fontFamily:SANS,padding:'4px 0 10px',borderTop:`1px solid ${A.border}`,marginTop:4}}>{week.weekNotes}</div>}
          {week.days.sort((a,b)=>a.date.localeCompare(b.date)).map(d => (
            <button key={d.date} onClick={()=>onJump(d.date)} style={{
              width:'100%',display:'flex',alignItems:'center',gap:12,
              padding:'12px 4px',background:'transparent',border:'none',
              borderTop:`1px solid ${A.border}`,cursor:'pointer',textAlign:'left',
              color:A.text,fontFamily:SANS,WebkitTapHighlightColor:'transparent',
            }}>
              <div style={{width:36,fontSize:9,color:A.textFaint,fontFamily:MONO,letterSpacing:0.8,fontWeight:600,textTransform:'uppercase'}}>
                {d.day_of_week.slice(0,3)}
                <div style={{fontSize:14,color:d.run?.sessions?.[0]?A.text:A.textDim,fontWeight:700,fontFamily:DISPLAY,letterSpacing:0,marginTop:1}}>
                  {new Date(d.date+'T00:00:00').getDate()}
                </div>
              </div>
              {(() => {
                const run = d.run?.sessions?.[0];
                if (!run) return <><div style={{width:6,height:6,borderRadius:3,background:'rgba(255,255,255,0.18)',flexShrink:0}}/><div style={{flex:1,minWidth:0,fontSize:13,color:A.textDim,fontWeight:500,fontStyle:'italic'}}>Rest</div></>;
                const c = runColor(run.subtype);
                return <>
                  <div style={{width:6,height:6,borderRadius:3,background:c.hue,flexShrink:0}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:9,color:c.hue,fontFamily:MONO,letterSpacing:1.2,fontWeight:700,marginBottom:2}}>{c.name}{run.poles?' · POLES':''}</div>
                    <div style={{fontSize:13,color:A.text,fontWeight:600,lineHeight:1.25,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{run.title}</div>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:2,fontFamily:MONO,flexShrink:0}}>
                    <div style={{fontSize:13,fontWeight:700,color:A.text,fontFamily:DISPLAY,letterSpacing:-0.2}}>{run.distance_mi!=null?`${run.distance_mi} mi`:`${run.duration_min}m`}</div>
                    <div style={{fontSize:9,color:A.textFaint,letterSpacing:0.4}}>{run.duration_min}m{run.elevation_gain_ft?` · ${run.elevation_gain_ft>=1000?(run.elevation_gain_ft/1000).toFixed(1)+'k':run.elevation_gain_ft}ft`:''}</div>
                  </div>
                </>;
              })()}
              <span style={{color:A.textFaint,fontSize:14,marginLeft:4}}>↗</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function PlanView({plan, currentDate, onJumpToDay}) {
  const weeks = useMemo(() => buildWeeks(plan), [plan]);
  const currentWeek = plan.days[currentDate]?.week_number;
  const scrollerRef = useRef(null);
  useEffect(() => {
    if (!scrollerRef.current || !currentWeek) return;
    const el = scrollerRef.current.querySelector(`[data-week="${currentWeek}"]`);
    if (el) el.scrollIntoView({block:'start',behavior:'auto'});
  }, []);
  return (
    <div ref={scrollerRef} style={{background:A.bg,color:A.text,fontFamily:SANS,minHeight:'100%',paddingBottom:32}}>
      <div style={{padding:'4px 16px 12px'}}>
        <div style={{fontSize:10,color:A.accent,fontFamily:MONO,letterSpacing:1.6,fontWeight:700,marginBottom:4}}>13 WEEKS · WHITE RIVER 50K</div>
        <div style={{fontSize:22,fontWeight:800,color:A.text,fontFamily:DISPLAY,letterSpacing:-0.6,lineHeight:1.1}}>The full plan</div>
        <div style={{fontSize:12,color:A.textDim,marginTop:4}}>Tap any week to expand. Tap a workout to jump into that day.</div>
      </div>
      <div style={{padding:'0 16px 14px',display:'flex',gap:10,flexWrap:'wrap'}}>
        {[['Base','#4ade80'],['Build','#ff5a3c'],['Peak','#ffb020'],['Taper_1','#60a5fa'],['Race_week','#c084fc']].map(([k,c]) => (
          <div key={k} style={{display:'flex',alignItems:'center',gap:6,fontSize:9,color:A.textFaint,fontFamily:MONO,letterSpacing:1,fontWeight:600}}>
            <span style={{width:8,height:8,borderRadius:2,background:c}}/>
            {phaseStyle(k).label}
          </div>
        ))}
      </div>
      <div style={{padding:'0 16px',display:'flex',flexDirection:'column',gap:10}}>
        {weeks.map(w => (
          <div key={w.n} data-week={w.n}>
            <WeekCard week={w} defaultOpen={w.n===currentWeek} onJump={onJumpToDay}/>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────
function App() {
  const plan = window.PLAN_DATA;
  const dates = Object.keys(plan.days).sort();
  const [selected, setSelected] = useState(() => resolveToday(plan));
  const [filter, setFilter] = useState('all');
  const [transitioning, setTransitioning] = useState(false);
  const [view, setView] = useState('day'); // 'day' | 'plan'

  const jumpToDay = (d) => {
    setSelected(d);
    setView('day');
    setTimeout(() => {
      document.getElementById('app-scroll')?.scrollTo({top:0,behavior:'auto'});
    }, 0);
  };

  const switchDay = (d) => {
    if (d === selected) return;
    setTransitioning(true);
    setTimeout(() => { setSelected(d); setTransitioning(false); }, 140);
  };

  if (view === 'plan') {
    return (
      <div id="app-scroll" style={{background:A.bg,height:'100vh',overflowY:'auto'}}>
        <div style={{
          position:'sticky',top:0,zIndex:10,background:A.bg,
          borderBottom:`1px solid ${A.border}`,
          padding:'14px 16px',display:'flex',alignItems:'center',gap:10,
        }}>
          <button onClick={()=>setView('day')} style={{
            height:36,padding:'0 12px',borderRadius:10,background:A.surface2,
            border:`1px solid ${A.border}`,display:'flex',alignItems:'center',
            gap:6,cursor:'pointer',color:A.text,fontFamily:MONO,
            fontSize:10,letterSpacing:1.4,fontWeight:700,
            WebkitTapHighlightColor:'transparent',
          }}>
            <Icon name="back" size={14} color={A.text}/>
            TODAY
          </button>
          <div style={{flex:1}}/>
          <div style={{fontSize:10,color:A.textDim,fontFamily:MONO,letterSpacing:1.4,fontWeight:700}}>FULL PLAN</div>
        </div>
        <PlanView plan={plan} currentDate={selected} onJumpToDay={jumpToDay}/>
      </div>
    );
  }

  const day = plan.days[selected];
  const showWorkouts = filter === 'all' || filter === 'workouts';
  const showNutrition = filter === 'all' || filter === 'nutrition';
  const showRoutines = filter === 'all' || filter === 'routines';
  const runSessions = day.run?.sessions || [];
  const strSessions = day.strength?.sessions || [];
  const allSessions = [
    ...runSessions.map(s => ({...s, kind:'run'})),
    ...strSessions.map(s => ({...s, kind:'strength'})),
  ];
  const isRest = day.rest_day || (allSessions.length === 0);
  const fueling = day.nutrition?.session_fueling || [];

  return (
    <div id="app-scroll" style={{height:'100vh',overflowY:'auto',background:A.bg}}>
      <div style={{background:A.bg,color:A.text,fontFamily:SANS,minHeight:'100%',paddingBottom:40}}>
        {/* sticky header */}
        <div style={{position:'sticky',top:0,zIndex:10,background:A.bg,borderBottom:`1px solid ${A.border}`}}>
          <div style={{padding:'14px 16px 6px',display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:36,height:36,borderRadius:10,background:A.surface2,border:`1px solid ${A.border}`,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <Icon name="mountain" size={16} color={A.accent}/>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:10,color:A.accent,fontFamily:MONO,letterSpacing:1.6,fontWeight:700}}>
                WEEK {day.week_number} · {(day.run?.phase||day.strength?.phase||'BASE').toUpperCase().replace('_',' ')}
              </div>
              <div style={{fontSize:18,fontWeight:700,color:A.text,fontFamily:DISPLAY,letterSpacing:-0.4}}>
                {formatDayLong(selected)}
              </div>
            </div>
            <button onClick={()=>setView('plan')} style={{
              height:36,padding:'0 12px',borderRadius:10,background:A.surface2,
              border:`1px solid ${A.border}`,display:'flex',alignItems:'center',
              justifyContent:'center',gap:6,cursor:'pointer',color:A.text,
              fontFamily:MONO,fontSize:10,letterSpacing:1.4,fontWeight:700,
              WebkitTapHighlightColor:'transparent',
            }}>
              <Icon name="list" size={14} color={A.text}/>
              PLAN
            </button>
          </div>
          <DayStrip dates={dates} selected={selected} onSelect={switchDay} plan={plan}/>
          <FilterChips filter={filter} setFilter={setFilter}/>
        </div>

        {/* day notes */}
        {day.run?.day_notes && showWorkouts && (
          <div style={{padding:'14px 16px 0'}}>
            <div style={{background:'linear-gradient(135deg,rgba(255,90,60,0.08),rgba(255,176,32,0.04))',border:'1px solid rgba(255,90,60,0.22)',borderRadius:12,padding:'10px 12px',display:'flex',gap:10,alignItems:'flex-start'}}>
              <span style={{fontSize:9,color:A.accent,fontFamily:MONO,letterSpacing:1.4,fontWeight:700,padding:'2px 6px',background:'rgba(255,90,60,0.16)',borderRadius:4,flexShrink:0,marginTop:1}}>!</span>
              <div style={{fontSize:12,color:A.text,lineHeight:1.5,fontFamily:SANS}}>{day.run.day_notes}</div>
            </div>
          </div>
        )}

        {/* main content */}
        <div style={{
          padding:'16px',display:'flex',flexDirection:'column',gap:14,
          opacity:transitioning?0:1,
          transform:transitioning?'translateY(8px)':'translateY(0)',
          transition:'opacity .14s ease,transform .14s ease',
        }}>
          {isRest && (
            <div style={{padding:'40px 20px',textAlign:'center',background:A.surface,borderRadius:20,border:`1px solid ${A.border}`}}>
              <div style={{fontSize:11,color:A.textDim,fontFamily:MONO,letterSpacing:1.6,marginBottom:6}}>SCHEDULED</div>
              <div style={{fontSize:32,fontWeight:800,color:A.text,fontFamily:DISPLAY,letterSpacing:-1}}>REST</div>
              <div style={{fontSize:13,color:A.textDim,marginTop:6}}>Recovery day. Routines + supplements still apply.</div>
            </div>
          )}

          {filter === 'all' ? (
            // ── ALL tab: minimal focused view ──
            <>
              {allSessions.length > 0 && (
                <>
                  {allSessions.map((s,i) => (
                    <HeroWorkoutMinimal key={i} session={s} kind={s.kind}/>
                  ))}
                </>
              )}
              {day.nutrition && <NutritionCardMinimal nutrition={day.nutrition}/>}
              {allSessions.length > 0 && <DayTimeline day={day} plan={plan}/>}
            </>
          ) : (
            // ── Other tabs: full detail ──
            <>
              {showWorkouts && allSessions.length > 0 && (
                <>
                  {allSessions.map((s, i) => {
                    const isRun = s.kind === 'run';
                    const isStr = s.kind === 'strength';
                    const prePost = isRun ? (
                      <>
                        <PrePostCard block={plan.session_protocols.run.pre_run} kind="pre" label="RUN WARM-UP" accent="#60a5fa"/>
                        <PrePostCard block={plan.session_protocols.run.post_run} kind="post" label="RUN COOLDOWN" accent="#4ade80"/>
                      </>
                    ) : isStr ? (
                      <>
                        <PrePostCard block={plan.session_protocols.strength.pre_strength} kind="pre" label="STRENGTH PREP" accent="#60a5fa"/>
                        <PrePostCard block={plan.session_protocols.strength.post_strength} kind="post" label="MOBILITY" accent="#4ade80"/>
                      </>
                    ) : null;
                    return (
                      <HeroWorkout
                        key={i}
                        session={s}
                        kind={s.kind}
                        isSecondary={i > 0}
                        fueling={fueling}
                        prePost={prePost}
                        workoutLabel={s.kind === 'run' ? runColor(s.subtype).name : strColor(s.subtype).name}
                      />
                    );
                  })}
                </>
              )}
              {showNutrition && day.nutrition && (
                <>
                  <NutritionCard nutrition={day.nutrition}/>
                  <FuelingTimeline items={day.nutrition.session_fueling}/>
                  <Supplements supplements={plan.supplements} weekNumber={day.week_number}/>
                </>
              )}
              {showRoutines && (
                <DailyRoutines routines={plan.daily_routines} weekNumber={day.week_number}/>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.log('SW error:', err));
